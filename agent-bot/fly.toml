# fly.toml - Fly.io configuration for agent-bot

app = "agent-bot"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Secrets to set via: fly secrets set
# - TELEGRAM_BOT_TOKEN
# - LINE_CHANNEL_SECRET
# - LINE_CHANNEL_ACCESS_TOKEN
# - AUTHORIZED_USERS (comma-separated list of user IDs)
