name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    name: Compile check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev
      - name: Compile agent.v11
        run: |
          cc -O2 -Wall -Wno-unused-result -Wno-comment -std=c99 \
            -D_POSIX_C_SOURCE=200809L \
            -o agent.v11 agent.v11.c cJSON.c -lcurl -lm
          echo "Linux build OK"

  build-macos:
    name: Build + server (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install curl

      - name: Build agent.v11
        run: |
          cc -O2 -Wall -Wno-unused-result -Wno-comment -std=c99 \
            -D_POSIX_C_SOURCE=200809L -D_DARWIN_C_SOURCE \
            -o agent.v11 agent.v11.c cJSON.c -lcurl -lm
          echo "Build successful: $(file agent.v11)"

      - name: Build Swift server
        run: |
          swiftc -O web/server.swift -o web/server-swift
          echo "Swift build successful: $(file web/server-swift)"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: |
            agent.v11
            web/server-swift
          retention-days: 7
