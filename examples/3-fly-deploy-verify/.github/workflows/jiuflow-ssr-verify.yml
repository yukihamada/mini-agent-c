name: jiuflow-ssr deploy verify
# For the jiuflow-ssr repo (Rust+axum, Fly.io)

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  verify:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libcurl4-openssl-dev

      - run: curl -L https://fly.io/install.sh | sh; echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - run: |
          git clone --depth 1 https://github.com/yukihamada/mini-agent-c.git /tmp/mac
          cd /tmp/mac && gcc -O2 -Wall -Wno-comment -std=c99 -D_POSIX_C_SOURCE=200809L \
              -o agent.v4 agent.v4.c cJSON.c -lcurl -lm

      - name: Verify jiuflow.art
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd /tmp/mac/examples/3-fly-deploy-verify
          ./verify.sh jiuflow-ssr \
            https://jiuflow.art \
            https://jiuflow.art/api/v1/tournaments \
            https://jiuflow-ssr.fly.dev/health
