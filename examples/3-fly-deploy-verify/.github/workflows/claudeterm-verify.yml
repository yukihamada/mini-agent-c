name: claudeterm (chatweb.ai) deploy verify
#
# For the claudeterm repo that deploys to Fly.io app "claudeterm"
# → https://chatweb.ai

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  verify:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcurl4-openssl-dev

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Build mini-agent-c
        run: |
          git clone --depth 1 https://github.com/yukihamada/mini-agent-c.git /tmp/mac
          cd /tmp/mac
          gcc -O2 -Wall -Wno-comment -std=c99 -D_POSIX_C_SOURCE=200809L \
              -o agent.v4 agent.v4.c cJSON.c -lcurl -lm

      - name: Verify public endpoints
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          cd /tmp/mac/examples/3-fly-deploy-verify
          ./verify.sh claudeterm \
            https://chatweb.ai \
            https://chatweb.ai/health \
            https://teai.io \
            https://api.chatweb.ai/v1/models

      - name: Telegram notify on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          [ -z "${TG_TOKEN:-}" ] && exit 0
          curl -sS "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=🚨 claudeterm verify failed: $(date -u +%Y-%m-%dT%H:%M:%SZ) — https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
