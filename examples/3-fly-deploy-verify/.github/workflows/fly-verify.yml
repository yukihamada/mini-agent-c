name: Fly.io deploy verify

# Trigger on push to main or after a deploy workflow completes
on:
  workflow_run:
    workflows: ["Deploy to Fly.io"]
    types: [completed]
  workflow_dispatch:
    inputs:
      app:
        description: 'Fly app name'
        required: true
        default: 'enablerdao'
      urls:
        description: 'Space-separated URLs to verify'
        required: true
        default: 'https://enablerdao.com'

jobs:
  verify:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build mini-agent-c
        run: |
          # fetch cJSON if not vendored
          if [ ! -f cJSON.c ]; then
            curl -sL https://raw.githubusercontent.com/DaveGamble/cJSON/master/cJSON.c -o cJSON.c
            curl -sL https://raw.githubusercontent.com/DaveGamble/cJSON/master/cJSON.h -o cJSON.h
          fi
          gcc -O2 -Wall -Wno-comment -std=c99 -D_POSIX_C_SOURCE=200809L \
              -o agent.v4 agent.v4.c cJSON.c -lcurl -lm

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh
        env:
          FLYCTL_INSTALL: /home/runner/.fly

      - name: Verify deploy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          PATH: /home/runner/.fly/bin:${{ env.PATH }}
        run: |
          APP="${{ github.event.inputs.app || 'enablerdao' }}"
          URLS="${{ github.event.inputs.urls || 'https://enablerdao.com' }}"
          ./examples/3-fly-deploy-verify/verify.sh "$APP" $URLS

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Fly deploy verification failed for ${{ github.event.inputs.app }}"
