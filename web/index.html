<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evo">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/manifest.json">
<title>Evo</title>
<style>
:root {
  --bg:        #0a0a0f;
  --s1:        #0f0f16;
  --s2:        #14141d;
  --s3:        #1a1a24;
  --s4:        #20202d;
  --bd:        #252534;
  --bd2:       #2e2e3f;
  --text:      #f0f0f7;
  --sub:       #7a7a9a;
  --muted:     #4a4a6a;
  --em:        #10b981;
  --em-g:      rgba(16,185,129,.18);
  --em-d:      rgba(16,185,129,.07);
  --em-s:      0 0 20px rgba(16,185,129,.25);
  --em-glow:   0 0 32px rgba(16,185,129,.15), 0 0 64px rgba(16,185,129,.08);
  --violet:    #8b5cf6;
  --violet-d:  rgba(139,92,246,.12);
  --violet-g:  rgba(139,92,246,.25);
  --blue:      #6366f1;
  --blue-g:    rgba(99,102,241,.2);
  --amber:     #f59e0b;
  --err:       #f43f5e;
  --err-g:     rgba(244,63,94,.15);
  --r:         18px;
  --ease-out:  cubic-bezier(0.25, 0.8, 0.25, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }

body {
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.65 -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
  display: flex; flex-direction: column; overflow: hidden;
  -webkit-text-size-adjust: 100%;
  letter-spacing: -0.01em;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

/* ─── HEADER ─── */
header {
  position: relative; z-index: 20;
  padding: 0 18px;
  padding-top: max(12px, env(safe-area-inset-top));
  height: calc(58px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(180deg, rgba(10,10,15,0.96) 0%, rgba(10,10,15,0.92) 100%);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

.logo-wrap { display: flex; align-items: center; gap: 11px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, #10b981 0%, #059669 55%, #047857 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--em-s), inset 0 1px 0 rgba(255,255,255,0.18);
  position: relative;
  transition: transform 0.3s var(--ease-out);
}
.logo-mark:hover { transform: scale(1.06); }
.logo-mark::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22) 0%, transparent 60%);
  border-radius: 12px;
}
.logo-mark svg { position: relative; z-index: 1; }
.logo-text { 
  font-size: 21px; font-weight: 700; letter-spacing: -0.05em; 
  background: linear-gradient(135deg, #fff 0%, #e8e8ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.status-wrap { display: flex; align-items: center; gap: 7px; }
.sdot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
  transition: all 0.4s var(--ease-out);
  box-shadow: 0 0 0 rgba(16,185,129,0);
}
.sdot.on { 
  background: var(--em); 
  box-shadow: 0 0 12px var(--em), 0 0 24px rgba(16,185,129,0.5);
  animation: pulse 2s var(--ease-in-out) infinite;
}
.stext { 
  font-size: 12.5px; color: var(--sub); 
  transition: all 0.3s var(--ease-out);
  font-weight: 500;
}
.stext.on { color: var(--em); }
@keyframes pulse { 
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(0.92); }
}

.spacer { flex: 1; }

.hbtn {
  width: 38px; height: 38px; border-radius: 11px;
  border: 1px solid var(--bd2); background: var(--s2); color: var(--sub);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.22s var(--ease-out);
  position: relative; overflow: hidden;
}
.hbtn::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.2s;
}
.hbtn:hover::before { opacity: 1; }
.hbtn:active { transform: scale(0.93); opacity: 0.75; }
.hbtn.on { 
  color: var(--em); 
  border-color: rgba(16,185,129,0.55); 
  background: var(--em-d);
  box-shadow: 0 0 18px rgba(16,185,129,0.22);
}

/* ─── MESSAGES ─── */
main { flex: 1; overflow: hidden; position: relative; }
.msgs {
  height: 100%; overflow-y: auto;
  padding: 26px 0 18px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* welcome with animated gradient background */
.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 64vh; padding: 48px 28px;
  text-align: center; gap: 0;
  animation: welcomeFadeIn 0.7s var(--ease-out);
  position: relative;
}
@keyframes welcomeFadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: none; }
}

/* Animated gradient background for welcome */
.welcome::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: radial-gradient(60% 60% at 50% 50%, 
    rgba(16,185,129,0.08) 0%, 
    rgba(139,92,246,0.06) 25%,
    rgba(99,102,241,0.05) 50%,
    transparent 70%);
  animation: gradientRotate 15s ease-in-out infinite;
  z-index: -1;
  filter: blur(60px);
}
@keyframes gradientRotate {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}

/* Particle effect overlay */
.welcome::after {
  content: '';
  position: absolute;
  inset: -100px;
  background-image: 
    radial-gradient(2px 2px at 20% 30%, rgba(16,185,129,0.4), transparent),
    radial-gradient(2px 2px at 40% 60%, rgba(139,92,246,0.35), transparent),
    radial-gradient(2px 2px at 60% 20%, rgba(99,102,241,0.3), transparent),
    radial-gradient(2px 2px at 80% 80%, rgba(16,185,129,0.35), transparent),
    radial-gradient(1.5px 1.5px at 30% 70%, rgba(245,158,11,0.25), transparent),
    radial-gradient(1.5px 1.5px at 70% 40%, rgba(16,185,129,0.3), transparent);
  background-size: 200px 200px;
  animation: particlesFloat 20s linear infinite;
  opacity: 0.6;
  z-index: -1;
}
@keyframes particlesFloat {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(-50px) rotate(360deg); }
}

.welcome-visual {
  position: relative; margin-bottom: 32px;
}
.welcome-ring {
  width: 100px; height: 100px; border-radius: 30px;
  background: linear-gradient(135deg, rgba(16,185,129,0.16) 0%, rgba(139,92,246,0.12) 100%);
  border: 1px solid rgba(16,185,129,0.25);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--em-glow), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: ringFloat 4.5s var(--ease-in-out) infinite;
  position: relative;
}
@keyframes ringFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-6px) scale(1.03); }
}
.welcome-ring::before {
  content: ''; position: absolute; inset: -4px;
  background: linear-gradient(135deg, rgba(16,185,129,0.32) 0%, rgba(139,92,246,0.22) 100%);
  border-radius: 34px; opacity: 0.4; filter: blur(18px); z-index: -1;
  animation: ringPulse 4.5s var(--ease-in-out) infinite;
}
@keyframes ringPulse {
  0%, 100% { opacity: 0.35; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(1.05); }
}
.welcome-ring svg {
  animation: iconGlow 3s ease-in-out infinite;
}
@keyframes iconGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(16,185,129,0.4)); }
  50% { filter: drop-shadow(0 0 16px rgba(16,185,129,0.7)); }
}
.welcome h1 { 
  font-size: 38px; font-weight: 800; letter-spacing: -0.06em; 
  margin-bottom: 14px;
  background: linear-gradient(135deg, #fff 0%, #e8e8ff 45%, #d4d4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 60px rgba(16,185,129,0.15);
}
.welcome-sub { 
  font-size: 16px; color: var(--sub); 
  line-height: 1.85; margin-bottom: 40px;
  max-width: 460px;
}

/* Enhanced chips with icons */
.chips { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 520px; }
.chip {
  font-size: 14.5px; padding: 14px 24px; border-radius: 30px;
  border: 1px solid var(--bd2); 
  background: linear-gradient(180deg, var(--s3) 0%, var(--s2) 100%);
  color: var(--text); cursor: pointer; 
  transition: all 0.28s var(--ease-out);
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 10px;
  font-weight: 500;
}
.chip::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(16,185,129,0.2) 0%, rgba(139,92,246,0.15) 100%);
  opacity: 0; transition: opacity 0.28s;
}
.chip:hover::before { opacity: 1; }
.chip:hover {
  border-color: rgba(16,185,129,0.5);
  box-shadow: 0 6px 24px rgba(16,185,129,0.28), 0 0 0 1px rgba(16,185,129,0.15);
  transform: translateY(-2px);
}
.chip:active { 
  transform: scale(0.96);
  box-shadow: 0 4px 18px rgba(16,185,129,0.35);
}

/* rows */
@keyframes msgIn { 
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to { opacity: 1; transform: none; }
}
.row {
  display: flex; align-items: flex-end; gap: 11px;
  padding: 5px 18px; margin-bottom: 5px;
  animation: msgIn 0.3s var(--ease-out);
}
.row.user  { flex-direction: row-reverse; }
.row.agent { flex-direction: row; }

/* avatar */
.avatar {
  width: 32px; height: 32px; border-radius: 11px; flex-shrink: 0;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 2px;
  box-shadow: 0 4px 16px rgba(16,185,129,0.42), inset 0 1px 0 rgba(255,255,255,0.18);
  position: relative;
}
.avatar::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25) 0%, transparent 60%);
  border-radius: 11px;
}

/* bubbles */
.bub {
  max-width: 82%; padding: 15px 20px;
  font-size: 15.5px; line-height: 1.72; word-break: break-word;
}
.bub.user {
  background: linear-gradient(135deg, rgba(16,185,129,0.22) 0%, rgba(5,150,105,0.15) 100%);
  border: 1px solid rgba(16,185,129,0.32);
  border-radius: var(--r) var(--r) 7px var(--r);
  white-space: pre-wrap;
  box-shadow: 0 3px 16px rgba(16,185,129,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
}
.bub.agent {
  background: linear-gradient(180deg, var(--s1) 0%, var(--s2) 100%);
  border: 1px solid var(--bd);
  border-radius: var(--r) var(--r) var(--r) 7px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.25);
}

/* markdown inside agent bubble */
.code-wrap { position: relative; margin: 16px 0; }
.code-wrap .copy-btn {
  position: absolute; top: 11px; right: 11px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.62); border-radius: 8px;
  padding: 5px 12px; font: 11px/1.5 system-ui; cursor: pointer;
  transition: all 0.2s var(--ease-out); opacity: 0;
  -webkit-tap-highlight-color: transparent;
  min-height: 29px;
}
.code-wrap:hover .copy-btn { opacity: 1; }
@media (hover: none) { .code-wrap .copy-btn { opacity: 0.65; } }
.copy-btn:active { opacity: 1 !important; transform: scale(0.91); }
.copy-btn.copied { 
  color: #6ee7b7; border-color: #6ee7b7; 
  opacity: 1 !important; 
  background: rgba(110,231,183,0.16);
  box-shadow: 0 0 12px rgba(110,231,183,0.25);
}
.lang-tag {
  position: absolute; top: 11px; left: 13px;
  font: 10px 'SF Mono', 'Fira Code', Menlo, monospace; 
  color: rgba(255,255,255,0.32);
  text-transform: uppercase; letter-spacing: 0.06em; pointer-events: none;
}
.bub.agent pre {
  background: linear-gradient(180deg, var(--s3) 0%, var(--s4) 100%); 
  border: 1px solid var(--bd2);
  border-radius: 12px; padding: 16px 17px; margin: 0;
  overflow-x: auto; 
  font: 13px/1.6 'SF Mono','Fira Code',Menlo,monospace;
  color: #c8d3f5;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.bub.agent code:not(pre code) {
  background: var(--s4); border: 1px solid var(--bd2);
  border-radius: 5.5px; padding: 1px 7.5px;
  font: 13px 'SF Mono','Fira Code',Menlo,monospace;
  color: #6ee7b7;
}
.bub.agent strong { color: #fff; font-weight: 600; }
.bub.agent a { 
  color: var(--em); text-decoration: none; 
  border-bottom: 1px solid rgba(16,185,129,0.38);
  transition: border-color 0.2s;
}
.bub.agent a:hover { border-bottom-color: var(--em); }
.bub.agent ul, .bub.agent ol { padding-left: 22px; }
.bub.agent li { margin: 4px 0; }
.bub.agent h1,.bub.agent h2,.bub.agent h3 { 
  font-weight: 700; margin: 14px 0 6px; line-height: 1.35; 
}

/* thinking animation */
.think span {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: var(--sub); margin: 0 3.5px;
  animation: bob 1.5s var(--ease-in-out) infinite;
}
.think span:nth-child(2) { animation-delay: 0.22s; }
.think span:nth-child(3) { animation-delay: 0.44s; }
@keyframes bob { 
  0%, 70%, 100% { transform: translateY(0); opacity: 0.6; }
  35% { transform: translateY(-7px); opacity: 1; }
}

/* typing animation for first response */
.typing {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--sub);
  font-size: 14px;
}
.typing span {
  display: inline-block;
  width: 6px; height: 6px;
  background: linear-gradient(135deg, var(--em) 0%, var(--violet) 100%);
  border-radius: 50%;
  animation: typingBounce 1.4s var(--ease-in-out) infinite;
}
.typing span:nth-child(1) { animation-delay: 0s; }
.typing span:nth-child(2) { animation-delay: 0.18s; }
.typing span:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingBounce {
  0%, 100% { transform: translateY(0); opacity: 0.4; }
  50% { transform: translateY(-8px); opacity: 1; }
}

/* tool row */
.tool-row { padding: 5px 18px 5px 54px; animation: msgIn 0.18s var(--ease-out); }
.tool-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12.5px; color: #818cf8;
  background: rgba(129,140,248,0.1); 
  border: 1px solid rgba(129,140,248,0.28);
  padding: 5px 12px; border-radius: 8px;
  box-shadow: 0 2px 6px rgba(129,140,248,0.16);
}

/* meta / done / error */
.meta-row { padding: 5px 18px 5px 54px; animation: msgIn 0.18s var(--ease-out); }
.done-tag {
  display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px;
  color: var(--em);
  background: var(--em-d);
  border: 1px solid rgba(16,185,129,0.35);
  padding: 6px 14px; border-radius: 9px;
  box-shadow: 0 2px 12px rgba(16,185,129,0.2);
}
.speak-btn {
  background: none; border: 1px solid var(--bd2); color: var(--sub);
  border-radius: 6px; padding: 3px 9px; font-size: 14px; cursor: pointer;
  transition: all .15s; line-height: 1;
  -webkit-tap-highlight-color: transparent; min-height: 28px;
}
.speak-btn:hover, .speak-btn.speaking { color: var(--em); border-color: rgba(16,185,129,.4); }
.speak-btn.speaking { animation: pulse 1.2s ease-in-out infinite; }
.err-tag {
  display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px;
  color: #fca5a5;
  background: var(--err-g);
  border: 1px solid rgba(244,63,94,0.35);
  padding: 6px 14px; border-radius: 9px;
  box-shadow: 0 2px 12px rgba(244,63,94,0.2);
}
.err-bubble {
  max-width: 82%; padding: 14px 18px; border-radius: var(--r);
  background: rgba(244,63,94,0.1); 
  border: 1px solid rgba(244,63,94,0.35);
  color: #fca5a5; font-size: 14.5px;
  box-shadow: 0 3px 14px rgba(244,63,94,0.18);
}

/* elapsed time display */
.elapsed-row {
  padding: 4px 18px 5px 54px;
  animation: msgIn 0.18s var(--ease-out);
}
.elapsed-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px;
  color: var(--sub);
  background: var(--s3);
  border: 1px solid var(--bd2);
  padding: 4px 11px; border-radius: 7px;
}
.elapsed-tag svg {
  width: 10px; height: 10px;
}

/* ─── INPUT ─── */
.input-area {
  padding: 12px 16px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(10,10,15,0.96) 0%, rgba(10,10,15,1) 100%);
  backdrop-filter: blur(34px) -webkit-backdrop-filter: blur(34px);
  border-top: 1px solid var(--bd);
  flex-shrink: 0;
  position: relative;
}
.input-area::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(16,185,129,0.2) 50%, transparent 100%);
}
.input-pill {
  display: flex; align-items: flex-end; gap: 11px;
  background: linear-gradient(180deg, var(--s2) 0%, var(--s1) 100%);
  border: 2px solid var(--bd2);
  border-radius: 28px;
  padding: 9px 9px 9px 20px;
  transition: all 0.28s var(--ease-out);
  box-shadow: 0 3px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
}
.input-pill:focus-within {
  border-color: rgba(16,185,129,0.6);
  box-shadow: 0 0 0 4px rgba(16,185,129,0.08), 0 0 24px rgba(16,185,129,0.15), 0 4px 20px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
  transform: translateY(-1.5px);
}
.input-pill textarea {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font: 17px/1.58 -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  resize: none; min-height: 32px; max-height: 160px;
  padding: 4px 0; align-self: center;
  -webkit-appearance: none;
  caret-color: var(--em);
}
.input-pill textarea::placeholder { color: var(--muted); opacity: 0.72; }
.send {
  width: 40px; height: 40px; border-radius: 50%;
  border: none; cursor: pointer; flex-shrink: 0;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.22s var(--ease-out);
  box-shadow: 0 4px 16px rgba(16,185,129,0.52), inset 0 1px 0 rgba(255,255,255,0.25);
  position: relative; overflow: hidden;
}
.send::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.25) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.22s;
}
.send:hover::before { opacity: 1; }
.send:disabled { 
  opacity: 0.28; cursor: not-allowed; 
  box-shadow: none; transform: none !important;
}
.send.stop { 
  background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); 
  color: #fff; 
  box-shadow: 0 4px 16px rgba(244,63,94,0.52), inset 0 1px 0 rgba(255,255,255,0.2);
}
.send:active:not(:disabled) { 
  transform: scale(0.91); 
  box-shadow: 0 3px 12px rgba(16,185,129,0.42);
}
.send.stop:active:not(:disabled) {
  box-shadow: 0 3px 12px rgba(244,63,94,0.42);
}

/* ─── SETTINGS SHEET ─── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 90; opacity: 0; pointer-events: none;
  transition: opacity 0.32s var(--ease-out);
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, var(--s1) 0%, var(--s2) 100%);
  border: 1px solid var(--bd); border-bottom: none;
  border-radius: 28px 28px 0 0;
  z-index: 100; overflow-y: auto; max-height: 92vh;
  padding-bottom: max(32px, env(safe-area-inset-bottom));
  transform: translateY(104%);
  transition: transform 0.36s cubic-bezier(0.28, 0.84, 0.42, 1);
  box-shadow: 0 -5px 32px rgba(0,0,0,0.48);
}
.sheet.open { transform: none; }
.handle {
  width: 40px; height: 5.5px; border-radius: 3.5px;
  background: var(--bd2); margin: 18px auto 5px;
  transition: background 0.2s;
}
.sheet:hover .handle { background: #3a3a4a; }

.sg select:focus, .sg input:focus {

.evo-row {

<script>
const $ = s => document.querySelector(s);
const msgsEl = $('#msgs'), taskEl = $('#task'), sendBtn = $('#send');
let reader=null, agentRow=null, agentBubble=null, textBuf='';
let running=false, evolving=false;
let startTime=null, elapsedInterval=null, elapsedRow=null;

/* auth */
const tok = () => ($('#auth-token').value||localStorage.getItem('mac_token')||'').trim();
const hdrs = json => { const h={}; if(json) h['Content-Type']='application/json'; const t=tok(); if(t) h['Authorization']='Bearer '+t; return h; };
(()=>{ const i=$('#auth-token'),s=localStorage.getItem('mac_token'); if(s)i.value=s; i.addEventListener('input',()=>localStorage.setItem('mac_token',i.value.trim())); })();

/* sheet */
const overlay=$('#overlay'),sheet=$('#sheet'),sBtn=$('#settings-btn');
const openSheet=()=>{ overlay.classList.add('open'); sheet.classList.add('open'); sBtn.classList.add('on'); };
const closeSheet=()=>{ overlay.classList.remove('open'); sheet.classList.remove('open'); sBtn.classList.remove('on'); };
sBtn.addEventListener('click',()=>sheet.classList.contains('open')?closeSheet():openSheet());
overlay.addEventListener('click',closeSheet);

/* textarea */
taskEl.addEventListener('input',()=>{
  taskEl.style.height='auto';
  taskEl.style.height=Math.min(taskEl.scrollHeight,160)+'px';
  ui();
});
if(/iPhone|iPad/.test(navigator.userAgent))
  taskEl.addEventListener('focus',()=>setTimeout(()=>msgsEl.scrollTop=msgsEl.scrollHeight,300));

/* ui state */
function ui(){
  const busy=running||evolving;
  sendBtn.disabled=!busy&&!taskEl.value.trim();
  sendBtn.classList.toggle('stop',busy);
  $('#ico-send').style.display=busy?'none':'';
  $('#ico-stop').style.display=busy?'':'none';
  $('#sdot').className='sdot'+(busy?' on':'');
  $('#stext').className='stext'+(busy?' on':'');
  $('#stext').textContent=busy?(evolving?'進化中':'実行中'):'idle';
}

/* elapsed time */
function startElapsedTimer(){
  startTime = Date.now();
  elapsedRow = document.createElement('div');
  elapsedRow.className = 'elapsed-row';
  elapsedRow.innerHTML = `<span class="elapsed-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg><span class="elapsed-time">0.0s</span></span>`;
  msgsEl.appendChild(elapsedRow);
  scrollEnd();
  
  if(elapsedInterval) clearInterval(elapsedInterval);
  elapsedInterval = setInterval(() => {
    if(elapsedRow && startTime) {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      const timeSpan = elapsedRow.querySelector('.elapsed-time');
      if(timeSpan) timeSpan.textContent = elapsed + 's';
    }
  }, 100);
}

function stopElapsedTimer(){
  if(elapsedInterval) {
    clearInterval(elapsedInterval);
    elapsedInterval = null;
  }
  if(elapsedRow) {
    elapsedRow.remove();
    elapsedRow = null;
  }
}

function getElapsedSeconds(){
  if(startTime) return ((Date.now() - startTime) / 1000).toFixed(1);
  return '0.0';
}

const esc=s=>String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const scrollEnd=()=>{ msgsEl.scrollTop=msgsEl.scrollHeight; };
const removeWelcome=()=>{ const w=$('#welcome'); if(w)w.remove(); };

/* markdown renderer */
function render(raw){
  let s=raw
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>{
      const code=esc(c.trim());
      const lang=l?`<span class="lang-tag">${esc(l)}</span>`:'';
      return `<div class="code-wrap">${lang}<button class="copy-btn" onclick="copyCode(this)">copy</button><pre><code>${code}</code></pre></div>`;
    })
    .replace(/`([^`\n]+)`/g,(_,c)=>`<code>${esc(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,(_,t)=>`<h3>${t}</h3>`)
    .replace(/^\s*[-*]\s+(.+)$/gm,(_,t)=>`<li>${t}</li>`)
    .replace(/(<li>.*<\/li>)/s,m=>`<ul>${m}</ul>`)
    .replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  // newlines outside pre
  s=s.replace(/(?<!>)\n(?!<)/g,'<br>');
  return s;
}

function copyCode(btn){
  const code=btn.closest('.code-wrap').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='copied!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='copy'; btn.classList.remove('copied'); },2000);
  });
}

const avatarSVG=`<div class="avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>`;

function addUser(text){
  removeWelcome();
  const r=document.createElement('div'); r.className='row user';
  r.innerHTML=`<div class="bub user">${esc(text)}</div>`;
  msgsEl.appendChild(r); scrollEnd();
}

function startAgent(){
  removeWelcome();
  agentRow=document.createElement('div'); agentRow.className='row agent';
  agentRow.innerHTML=`${avatarSVG}<div class="bub agent"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(agentRow);
  agentBubble=agentRow.querySelector('.bub');
  scrollEnd();
}

function clearThink(){ 
  if(agentBubble){ 
    const d=agentBubble.querySelector('.think'); 
    const t=agentBubble.querySelector('.typing');
    if(d) d.remove();
    if(t) t.remove();
  } 
}

function addText(t){
  if(!agentBubble) startAgent();
  clearThink();
  textBuf+=t;
  agentBubble.innerHTML=render(textBuf);
  scrollEnd();
}

function addTool(name){
  if(!agentRow) startAgent();
  clearThink();
  const r=document.createElement('div'); r.className='tool-row';
  r.innerHTML=`<span class="tool-tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/></svg>${esc(name)}</span>`;
  msgsEl.insertBefore(r,agentRow); scrollEnd();
}

let currentAudio=null;
async function speak(text, btn){
  if(currentAudio){ currentAudio.pause(); currentAudio=null;
    document.querySelectorAll('.speak-btn.speaking').forEach(b=>{b.classList.remove('speaking');b.textContent='🔊';});
    if(btn.dataset.speaking){delete btn.dataset.speaking; return;}
  }
  btn.classList.add('speaking'); btn.textContent='⏹'; btn.dataset.speaking='1';
  try{
    const plain=text.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().slice(0,400);
    const res=await fetch('/speak',{method:'POST',headers:hdrs(true),body:JSON.stringify({text:plain})});
    if(!res.ok){btn.classList.remove('speaking');btn.textContent='🔊';return;}
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    currentAudio=new Audio(url);
    currentAudio.onended=()=>{btn.classList.remove('speaking');btn.textContent='🔊';delete btn.dataset.speaking;currentAudio=null;};
    currentAudio.play();
  }catch{btn.classList.remove('speaking');btn.textContent='🔊';delete btn.dataset.speaking;}
}

function doneOk(dur){
  stopElapsedTimer();
  clearThink();
  const savedText=textBuf;
  if(!textBuf){ agentRow?.remove(); agentRow=null; agentBubble=null; }
  const m=document.createElement('div'); m.className='meta-row';
  const d=typeof dur==='number'?dur:parseFloat(dur)||0;
  const ds=d<60?`${d.toFixed(1)}s`:`${Math.floor(d/60)}m${(d%60).toFixed(0)}s`;
  m.innerHTML=`<span class="done-tag"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>完了 · ${ds}</span>`;
  if(savedText){
    const sb=document.createElement('button');
    sb.className='speak-btn'; sb.textContent='🔊'; sb.title='読み上げ';
    sb.onclick=()=>speak(savedText,sb);
    m.appendChild(sb);
  }
  msgsEl.appendChild(m); scrollEnd();
  agentRow=null; agentBubble=null; textBuf='';
}

function doneErr(msg){
  stopElapsedTimer();
  clearThink();
  if(agentBubble){ agentRow?.remove(); agentRow=null; agentBubble=null; }
  const r=document.createElement('div'); r.className='row agent';
  r.innerHTML=`${avatarSVG}<div class="err-bubble">${esc(msg)}</div>`;
  msgsEl.appendChild(r); scrollEnd();
  agentRow=null; agentBubble=null; textBuf='';
}

function onEvent(text,isEv){
  let etype='',data='';
  for(const l of text.split('\n')){
    if(l.startsWith('event: '))etype=l.slice(7).trim();
    else if(l.startsWith('data: '))data=l.slice(6);
  }
  if(!data)return;
  let o; try{o=JSON.parse(data);}catch{return;}
  switch(etype){
    case 'evolve_start':
      startAgent(); clearThink();
      textBuf=`v${o.src_v} → v${o.tgt_v} 自己改善中…\n`;
      agentBubble.innerHTML=render(textBuf); break;
    case 'queued':{
      if(!agentBubble)startAgent();
      textBuf='⏳ ' + (o.message||'待機中...');
      agentBubble.innerHTML=render(textBuf); scrollEnd(); break;
    }
    case 'start': if(!agentBubble)startAgent(); textBuf=''; break;
    case 'text':{
      const raw=(o.content||'').replace(/^\n?\[assistant\]\s*/,'');
      if(raw.trim())addText(raw); break;
    }
    case 'log':{
      const line=o.line||'';
      if(line.startsWith('[tool]'))addTool(line.slice(6).trim().split(' ')[0]||line.slice(6,30).trim());
      else if(line.startsWith('[assistant]')){ const c=line.slice(11).trim(); if(c)addText(c+'\n'); }
      break;
    }
    case 'done':
      if(isEv){
        clearThink();
        const tag=`${o.success?'✓':'✗'} v${o.tgt_v} ${o.success?'完了':'失敗'} — ${o.duration_sec}s`;
        const m=document.createElement('div'); m.className='meta-row';
        m.innerHTML=`<span class="${o.success?'done-tag':'err-tag'}">${esc(tag)}</span>`;
        msgsEl.appendChild(m); scrollEnd();
        if(o.success)loadVer();
        agentRow=null; agentBubble=null; textBuf='';
      } else doneOk(o.duration_sec);
      break;
    case 'error': doneErr(o.message||JSON.stringify(o)); break;
  }
}

async function run(){
  const task=taskEl.value.trim(); if(!task)return;
  taskEl.blur(); running=true; ui(); closeSheet();
  addUser(task); textBuf=''; taskEl.value=''; taskEl.style.height='';
  startElapsedTimer();
  const body={task,model:$('#model').value,budget:parseInt($('#budget').value),
    max_turns:parseInt($('#max-turns').value),backend:'openai',
    api_base:'http://127.0.0.1:5001',stream:true,fallback:false};
  try{
    const res=await fetch('/run',{method:'POST',headers:hdrs(true),body:JSON.stringify(body)});
    if(!res.ok){doneErr(`HTTP ${res.status}`);return;}
    reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;while((i=buf.indexOf('\n\n'))>=0){onEvent(buf.slice(0,i),false);buf=buf.slice(i+2);}
    }
  }catch(e){if(e.name!=='AbortError')doneErr(e.message);}
  finally{running=false;ui();reader=null;agentRow=null;agentBubble=null;textBuf='';}
}

async function doEvolve(){
  if(running||evolving)return;
  evolving=true; ui(); closeSheet(); textBuf='';
  startElapsedTimer();
  try{
    const res=await fetch('/evolve',{method:'POST',headers:hdrs(false)});
    if(!res.ok){removeWelcome();doneErr(`HTTP ${res.status}`);return;}
    reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;while((i=buf.indexOf('\n\n'))>=0){onEvent(buf.slice(0,i),true);buf=buf.slice(i+2);}
    }
  }catch(e){if(e.name!=='AbortError')doneErr(e.message);}
  finally{evolving=false;ui();reader=null;agentRow=null;agentBubble=null;textBuf='';}
}

async function doStop(){
  stopElapsedTimer();
  if(reader){try{reader.cancel();}catch{}reader=null;}
  try{await fetch('/stop',{method:'POST',headers:hdrs(false)});}catch{}
  if(agentBubble){clearThink();agentBubble.innerHTML='<span style="color:var(--sub)">⏹ 停止</span>';}
  running=false;evolving=false;ui();
  agentRow=null;agentBubble=null;textBuf='';
}

const vibe=(ms=8)=>{try{navigator.vibrate&&navigator.vibrate(ms);}catch{}};

sendBtn.addEventListener('click',()=>{vibe();(running||evolving)?doStop():run();});
$('#evo-btn').addEventListener('click',()=>{vibe();evolving?doStop():doEvolve();});
taskEl.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();run();}});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(running||evolving)doStop();else if(sheet.classList.contains('open'))closeSheet();}
});

for(const b of document.querySelectorAll('.chip'))
  b.addEventListener('click',()=>{vibe(4);taskEl.value=b.dataset.t;taskEl.dispatchEvent(new Event('input'));taskEl.focus();});

/* シートをスワイプで閉じる */
(()=>{
  let sy=0,dy=0;
  sheet.addEventListener('touchstart',e =>{sy=e.touches[0].clientY;dy=0;},{passive:true});
  sheet.addEventListener('touchmove',e =>{
    dy=e.touches[0].clientY-sy;
    if(dy>0)sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',()=>{
    if(dy>80){closeSheet();}
    sheet.style.transform='';
  });
})();

async function loadVer(){
  try{
    const r=await fetch('/version',{headers:hdrs(false)});if(!r.ok)return;
    const d=await r.json();
    $('#ver-text').textContent=`v${d.binary_v||'?'} — 自己進化`;
  }catch{}
}
loadVer(); setInterval(loadVer,60000);

/* スマホ初回: トークン未設定なら設定シートを開くよう促す */
(()=>{
  const tok=localStorage.getItem('evo_token')||'';
  if(!tok){
    setTimeout(()=>{
      const b=document.createElement('div');
      b.style.cssText='position:fixed;top:calc(58px + env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);background:#1c1c28;border:1px solid rgba(16,185,129,0.38);color:#6ee7b7;font-size:13.5px;padding:12px 22px;border-radius:14px;z-index:50;cursor:pointer;white-space:nowrap;box-shadow:0 5px 26px rgba(0,0,0,0.48);animation:fadeIn 0.4s ease';
      b.textContent='⚙️ 設定からトークンを入力してください';
      b.onclick=()=>{openSheet();b.remove();};
      document.body.appendChild(b);
      setTimeout(()=>b.remove(),8000);
    },600);
  }
})();
</script>
</body>
