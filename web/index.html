<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evo">
<meta name="theme-color" content="#050508">
<link rel="manifest" href="/manifest.json">
<title>Evo</title>
<style>
:root {
  --bg:     #050508;
  --s1:     #0a0a10;
  --s2:     #0f0f17;
  --s3:     #15151f;
  --s4:     #1c1c28;
  --bd:     #1e1e2c;
  --bd2:    #27273a;
  --text:   #eaeaf4;
  --sub:    #7070a0;
  --muted:  #404060;
  --em:     #10b981;
  --em-g:   rgba(16,185,129,.18);
  --em-d:   rgba(16,185,129,.07);
  --em-s:   0 0 16px rgba(16,185,129,.3);
  --violet: #8b5cf6;
  --blue:   #6366f1;
  --err:    #f43f5e;
  --r:      16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font: 15px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex; flex-direction: column; overflow: hidden;
  -webkit-text-size-adjust: 100%;
}
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

/* ─── HEADER ─── */
header {
  position: relative; z-index: 20;
  padding: 0 14px;
  padding-top: max(10px, env(safe-area-inset-top));
  height: calc(52px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; gap: 8px;
  background: rgba(5,5,8,.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}
.logo-wrap { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(140deg, #10b981 0%, #059669 60%, #047857 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--em-s);
}
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: -.03em; }
.status-wrap { display: flex; align-items: center; gap: 5px; }
.sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
  transition: background .4s, box-shadow .4s;
}
.sdot.on { background: var(--em); box-shadow: 0 0 8px var(--em); animation: pulse 2s ease-in-out infinite; }
.stext { font-size: 12px; color: var(--sub); transition: color .3s; }
.stext.on { color: var(--em); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.spacer { flex: 1; }
.hbtn {
  width: 34px; height: 34px; border-radius: 9px;
  border: 1px solid var(--bd2); background: var(--s2); color: var(--sub);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: color .15s, border-color .2s, background .15s;
}
.hbtn:active { opacity: .6; }
.hbtn.on { color: var(--em); border-color: rgba(16,185,129,.4); background: var(--em-d); }

/* ─── MESSAGES ─── */
main { flex: 1; overflow: hidden; }
.msgs {
  height: 100%; overflow-y: auto;
  padding: 20px 0 12px;
  -webkit-overflow-scrolling: touch;
}

/* welcome */
.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 58vh; padding: 32px 24px;
  text-align: center; gap: 0;
}
.welcome-visual {
  position: relative; margin-bottom: 24px;
}
.welcome-ring {
  width: 80px; height: 80px; border-radius: 24px;
  background: linear-gradient(135deg, rgba(16,185,129,.15) 0%, rgba(139,92,246,.1) 100%);
  border: 1px solid rgba(16,185,129,.2);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 48px rgba(16,185,129,.1), inset 0 1px 0 rgba(255,255,255,.05);
}
.welcome h1 { font-size: 28px; font-weight: 800; letter-spacing: -.04em; margin-bottom: 8px; }
.welcome-sub { font-size: 14px; color: var(--sub); line-height: 1.75; margin-bottom: 28px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 400px; }
.chip {
  font-size: 13px; padding: 8px 16px; border-radius: 22px;
  border: 1px solid var(--bd2); background: var(--s3); color: var(--sub);
  cursor: pointer; transition: all .15s;
}
.chip:active { color: var(--em); border-color: rgba(16,185,129,.4); background: var(--em-d); transform: scale(.95); }

/* rows */
@keyframes msgIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
.row {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 2px 14px; margin-bottom: 2px;
  animation: msgIn .2s ease;
}
.row.user  { flex-direction: row-reverse; }
.row.agent { flex-direction: row; }

/* avatar */
.avatar {
  width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
  background: linear-gradient(140deg, #10b981, #059669);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1px;
  box-shadow: 0 2px 10px rgba(16,185,129,.3);
}

/* bubbles */
.bub {
  max-width: 80%; padding: 11px 15px;
  font-size: 15px; line-height: 1.65; word-break: break-word;
}
.bub.user {
  background: linear-gradient(135deg, rgba(16,185,129,.14) 0%, rgba(5,150,105,.08) 100%);
  border: 1px solid rgba(16,185,129,.2);
  border-radius: var(--r) var(--r) 5px var(--r);
  white-space: pre-wrap;
}
.bub.agent {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: var(--r) var(--r) var(--r) 5px;
}
/* markdown inside agent bubble */
.code-wrap { position: relative; margin: 10px 0; }
.code-wrap .copy-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.5); border-radius: 6px;
  padding: 4px 10px; font: 11px/1.5 system-ui; cursor: pointer;
  transition: all .15s; opacity: 0;
  -webkit-tap-highlight-color: transparent;
  min-height: 28px; /* touch target */
}
.code-wrap:hover .copy-btn { opacity: 1; }
/* always visible on touch devices */
@media (hover: none) { .code-wrap .copy-btn { opacity: .55; } }
.copy-btn:active { opacity: 1 !important; transform: scale(.93); }
.copy-btn.copied { color: #6ee7b7; border-color: #6ee7b7; opacity: 1 !important; }
.lang-tag {
  position: absolute; top: 8px; left: 12px;
  font: 10px 'SF Mono',Menlo,monospace; color: rgba(255,255,255,.25);
  text-transform: uppercase; letter-spacing: .05em; pointer-events: none;
}
.bub.agent pre {
  background: var(--s3); border: 1px solid var(--bd2);
  border-radius: 10px; padding: 13px 15px; margin: 0;
  overflow-x: auto; font: 13px/1.55 'SF Mono','Fira Code',Menlo,monospace;
  color: #c8d3f5;
}
.bub.agent code:not(pre code) {
  background: var(--s4); border: 1px solid var(--bd2);
  border-radius: 4px; padding: 1px 6px;
  font: 13px 'SF Mono','Fira Code',Menlo,monospace;
  color: #6ee7b7;
}
.bub.agent strong { color: #fff; font-weight: 600; }
.bub.agent a { color: var(--em); text-decoration: none; }
.bub.agent ul, .bub.agent ol { padding-left: 18px; }
.bub.agent li { margin: 2px 0; }
.bub.agent h1,.bub.agent h2,.bub.agent h3 { font-weight: 700; margin: 10px 0 4px; line-height: 1.3; }

/* thinking */
.think span {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--sub); margin: 0 2px;
  animation: bob 1.3s ease-in-out infinite;
}
.think span:nth-child(2) { animation-delay: .18s; }
.think span:nth-child(3) { animation-delay: .36s; }
@keyframes bob { 0%,70%,100%{transform:translateY(0)} 35%{transform:translateY(-5px)} }

/* tool row */
.tool-row { padding: 2px 14px 2px 48px; animation: msgIn .12s ease; }
.tool-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; color: #818cf8;
  background: rgba(129,140,248,.07); border: 1px solid rgba(129,140,248,.18);
  padding: 3px 10px; border-radius: 6px;
}

/* meta / done / error */
.meta-row { padding: 3px 14px 3px 48px; animation: msgIn .12s ease; }
.done-tag {
  display: inline-flex; align-items: center; gap: 5px; font-size: 11px;
  color: var(--em); background: var(--em-d); border: 1px solid rgba(16,185,129,.2);
  padding: 3px 10px; border-radius: 6px;
}
.err-bubble {
  max-width: 80%; padding: 10px 14px; border-radius: var(--r);
  background: rgba(244,63,94,.07); border: 1px solid rgba(244,63,94,.22);
  color: #fda4af; font-size: 14px;
}

/* ─── INPUT ─── */
.input-area {
  padding: 8px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: rgba(5,5,8,.9);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--bd);
  flex-shrink: 0;
}
.input-pill {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--s2);
  border: 1.5px solid var(--bd2);
  border-radius: 22px;
  padding: 7px 7px 7px 16px;
  transition: border-color .2s, box-shadow .25s;
  box-shadow: 0 1px 12px rgba(0,0,0,.3);
}
.input-pill:focus-within {
  border-color: rgba(16,185,129,.45);
  box-shadow: 0 0 0 3px rgba(16,185,129,.08), 0 1px 12px rgba(0,0,0,.3);
}
.input-pill textarea {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font: 16px/1.5 inherit;
  resize: none; min-height: 28px; max-height: 140px;
  padding: 3px 0; align-self: center;
  -webkit-appearance: none;
}
.input-pill textarea::placeholder { color: var(--muted); }
.send {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; cursor: pointer; flex-shrink: 0;
  background: var(--em); color: #000;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s, transform .1s, background .2s;
  box-shadow: 0 2px 12px rgba(16,185,129,.4);
}
.send:disabled { opacity: .22; cursor: not-allowed; box-shadow: none; }
.send.stop { background: var(--err); color: #fff; box-shadow: 0 2px 12px rgba(244,63,94,.35); }
.send:active:not(:disabled) { transform: scale(.88); }

/* ─── SETTINGS SHEET ─── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  z-index: 90; opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border: 1px solid var(--bd); border-bottom: none;
  border-radius: 24px 24px 0 0;
  z-index: 100; overflow-y: auto; max-height: 88vh;
  padding-bottom: max(28px, env(safe-area-inset-bottom));
  transform: translateY(102%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
.sheet.open { transform: none; }
.handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--bd2); margin: 14px auto 2px;
}
.sheet-head { font-size: 17px; font-weight: 700; padding: 14px 22px 8px; }
.sg { padding: 10px 22px; }
.sg label {
  display: block; font-size: 11px; font-weight: 600; color: var(--sub);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
}
.sg select, .sg input {
  width: 100%; background: var(--s3); color: var(--text);
  border: 1px solid var(--bd2); padding: 12px 14px; border-radius: 12px;
  font: 15px inherit; outline: none; -webkit-appearance: none;
  transition: border-color .15s;
}
.sg select:focus, .sg input:focus { border-color: rgba(16,185,129,.45); }
.sg select { font-size: 14px; }
.sep { height: 1px; background: var(--bd); margin: 6px 22px; }
.evo-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 22px;
}
.evo-row span { font-size: 14px; color: var(--sub); }
.evo-btn {
  padding: 9px 20px; border-radius: 22px;
  border: 1px solid rgba(139,92,246,.35); background: rgba(139,92,246,.1);
  color: #a78bfa; font: 13px/1 inherit; cursor: pointer;
  transition: opacity .15s;
}
.evo-btn:active:not(:disabled) { opacity: .6; }
.evo-btn:disabled { opacity: .3; cursor: not-allowed; }

/* スマホキーボード出現時: dvh で自動対応 */
@supports (height: 100dvh) {
  body { height: 100dvh; }
}
/* チップを横スクロールに */
@media (max-width: 480px) {
  .chips { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start;
    padding-bottom: 4px; max-width: 100%; scroll-snap-type: x mandatory; }
  .chip { flex-shrink: 0; scroll-snap-align: start; }
  .bub { max-width: 90%; }
}
@media (min-width: 640px) {
  .sheet { left: auto; right: 18px; bottom: 18px; width: 360px; border-radius: 20px; border: 1px solid var(--bd); max-height: 85vh; }
  .bub { max-width: 70%; }
  .input-area { padding: 10px 16px max(12px, env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    <span class="logo-text">Evo</span>
  </div>
  <div class="status-wrap">
    <span class="sdot" id="sdot"></span>
    <span class="stext" id="stext">idle</span>
  </div>
  <div class="spacer"></div>
  <button class="hbtn" id="settings-btn" aria-label="設定">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<main>
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="welcome-visual">
        <div class="welcome-ring">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--em)" stroke-width="1.6"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
      </div>
      <h1>Evo</h1>
      <p class="welcome-sub">自律エージェント — ローカル LLM で動作<br>コード実行・ファイル操作・外部サービス連携</p>
      <div class="chips" id="welcome-chips">
        <button class="chip" data-t="Use bash to show date, uptime, and disk usage">システム状態</button>
        <button class="chip" data-t="Use bash to list top 5 CPU processes">プロセス確認</button>
        <button class="chip" data-t="bash: git log --oneline -10">最近のコミット</button>
        <button class="chip" data-t="Run eval.sh ./agent.v11 and report score">自己評価スコア</button>
      </div>
    </div>
  </div>
</main>

<div class="input-area">
  <div class="input-pill">
    <textarea id="task" placeholder="何でも聞いて…" rows="1"></textarea>
    <button class="send" id="send" disabled>
      <svg id="ico-send" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      <svg id="ico-stop" width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="sheet-head">設定</div>
  <div class="sg">
    <label>モデル</label>
    <select id="model">
      <option value="mlx-community/Qwen3.5-122B-A10B-4bit" selected>Qwen3.5 122B — 最高品質</option>
      <option value="mlx-community/Qwen3.5-27B-4bit">Qwen3.5 27B</option>
      <option value="mlx-community/Qwen3.5-35B-A3B-4bit">Qwen3.5 35B</option>
      <option value="mlx-community/Qwen3.5-9B-4bit">Qwen3.5 9B — 高速</option>
      <option value="mlx-community/gemma-4-31b-it-4bit">Gemma 31B</option>
      <option value="claude-sonnet-4-5">Sonnet ☁</option>
      <option value="claude-haiku-4-5">Haiku ☁</option>
    </select>
  </div>
  <div class="sg">
    <label>認証トークン</label>
    <input type="password" id="auth-token" placeholder="Bearer token">
  </div>
  <div class="sep"></div>
  <div class="sg">
    <label>最大ターン数</label>
    <input type="number" id="max-turns" value="15" min="1" max="60">
  </div>
  <div class="sg">
    <label>トークン予算</label>
    <input type="number" id="budget" value="80000" step="10000" min="1000">
  </div>
  <div class="sep"></div>
  <div class="evo-row">
    <span id="ver-text">— 自己進化</span>
    <button class="evo-btn" id="evo-btn">⚡ Evolve</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const msgsEl = $('#msgs'), taskEl = $('#task'), sendBtn = $('#send');
let reader=null, agentRow=null, agentBubble=null, textBuf='';
let running=false, evolving=false;

/* auth */
const tok = () => ($('#auth-token').value||localStorage.getItem('mac_token')||'').trim();
const hdrs = json => { const h={}; if(json) h['Content-Type']='application/json'; const t=tok(); if(t) h['Authorization']='Bearer '+t; return h; };
(()=>{ const i=$('#auth-token'),s=localStorage.getItem('mac_token'); if(s)i.value=s; i.addEventListener('input',()=>localStorage.setItem('mac_token',i.value.trim())); })();

/* sheet */
const overlay=$('#overlay'),sheet=$('#sheet'),sBtn=$('#settings-btn');
const openSheet=()=>{ overlay.classList.add('open'); sheet.classList.add('open'); sBtn.classList.add('on'); };
const closeSheet=()=>{ overlay.classList.remove('open'); sheet.classList.remove('open'); sBtn.classList.remove('on'); };
sBtn.addEventListener('click',()=>sheet.classList.contains('open')?closeSheet():openSheet());
overlay.addEventListener('click',closeSheet);

/* textarea */
taskEl.addEventListener('input',()=>{
  taskEl.style.height='auto';
  taskEl.style.height=Math.min(taskEl.scrollHeight,140)+'px';
  ui();
});
if(/iPhone|iPad/.test(navigator.userAgent))
  taskEl.addEventListener('focus',()=>setTimeout(()=>msgsEl.scrollTop=msgsEl.scrollHeight,300));

/* ui state */
function ui(){
  const busy=running||evolving;
  sendBtn.disabled=!busy&&!taskEl.value.trim();
  sendBtn.classList.toggle('stop',busy);
  $('#ico-send').style.display=busy?'none':'';
  $('#ico-stop').style.display=busy?'':'none';
  $('#sdot').className='sdot'+(busy?' on':'');
  $('#stext').className='stext'+(busy?' on':'');
  $('#stext').textContent=busy?(evolving?'進化中':'実行中'):'idle';
}

const esc=s=>String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const scrollEnd=()=>{ msgsEl.scrollTop=msgsEl.scrollHeight; };
const removeWelcome=()=>{ const w=$('#welcome'); if(w)w.remove(); };

/* markdown renderer */
function render(raw){
  let s=raw
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>{
      const code=esc(c.trim());
      const lang=l?`<span class="lang-tag">${esc(l)}</span>`:'';
      return `<div class="code-wrap">${lang}<button class="copy-btn" onclick="copyCode(this)">copy</button><pre><code>${code}</code></pre></div>`;
    })
    .replace(/`([^`\n]+)`/g,(_,c)=>`<code>${esc(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,(_,t)=>`<h3>${t}</h3>`)
    .replace(/^\s*[-*]\s+(.+)$/gm,(_,t)=>`<li>${t}</li>`)
    .replace(/(<li>.*<\/li>)/s,m=>`<ul>${m}</ul>`)
    .replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  // newlines outside pre
  s=s.replace(/(?<!>)\n(?!<)/g,'<br>');
  return s;
}

function copyCode(btn){
  const code=btn.closest('.code-wrap').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='copied!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='copy'; btn.classList.remove('copied'); },2000);
  });
}

const avatarSVG=`<div class="avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>`;

function addUser(text){
  removeWelcome();
  const r=document.createElement('div'); r.className='row user';
  r.innerHTML=`<div class="bub user">${esc(text)}</div>`;
  msgsEl.appendChild(r); scrollEnd();
}

function startAgent(){
  removeWelcome();
  agentRow=document.createElement('div'); agentRow.className='row agent';
  agentRow.innerHTML=`${avatarSVG}<div class="bub agent"><div class="think"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(agentRow);
  agentBubble=agentRow.querySelector('.bub');
  scrollEnd();
}

function clearThink(){ if(agentBubble){ const d=agentBubble.querySelector('.think'); if(d)d.remove(); } }

function addText(t){
  if(!agentBubble) startAgent();
  clearThink();
  textBuf+=t;
  agentBubble.innerHTML=render(textBuf);
  scrollEnd();
}

function addTool(name){
  if(!agentRow) startAgent();
  clearThink();
  const r=document.createElement('div'); r.className='tool-row';
  r.innerHTML=`<span class="tool-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/></svg>${esc(name)}</span>`;
  msgsEl.insertBefore(r,agentRow); scrollEnd();
}

function doneOk(dur){
  clearThink();
  if(!textBuf){ agentRow?.remove(); agentRow=null; agentBubble=null; }
  const m=document.createElement('div'); m.className='meta-row';
  m.innerHTML=`<span class="done-tag"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>${dur}s</span>`;
  msgsEl.appendChild(m); scrollEnd();
  agentRow=null; agentBubble=null; textBuf='';
}

function doneErr(msg){
  clearThink();
  if(agentBubble){ agentRow?.remove(); agentRow=null; agentBubble=null; }
  const r=document.createElement('div'); r.className='row agent';
  r.innerHTML=`${avatarSVG}<div class="err-bubble">${esc(msg)}</div>`;
  msgsEl.appendChild(r); scrollEnd();
  agentRow=null; agentBubble=null; textBuf='';
}

function onEvent(text,isEv){
  let etype='',data='';
  for(const l of text.split('\n')){
    if(l.startsWith('event: '))etype=l.slice(7).trim();
    else if(l.startsWith('data: '))data=l.slice(6);
  }
  if(!data)return;
  let o; try{o=JSON.parse(data);}catch{return;}
  switch(etype){
    case 'evolve_start':
      startAgent(); clearThink();
      textBuf=`v${o.src_v} → v${o.tgt_v} 自己改善中…\n`;
      agentBubble.innerHTML=render(textBuf); break;
    case 'queued':{
      if(!agentBubble)startAgent();
      textBuf='⏳ ' + (o.message||'待機中...');
      agentBubble.innerHTML=render(textBuf); scrollEnd(); break;
    }
    case 'start': if(!agentBubble)startAgent(); textBuf=''; break;
    case 'text':{
      const raw=(o.content||'').replace(/^\n?\[assistant\]\s*/,'');
      if(raw.trim())addText(raw); break;
    }
    case 'log':{
      const line=o.line||'';
      if(line.startsWith('[tool]'))addTool(line.slice(6).trim().split(' ')[0]||line.slice(6,30).trim());
      else if(line.startsWith('[assistant]')){ const c=line.slice(11).trim(); if(c)addText(c+'\n'); }
      break;
    }
    case 'done':
      if(isEv){
        clearThink();
        const tag=`${o.success?'✓':'✗'} v${o.tgt_v} ${o.success?'完了':'失敗'} — ${o.duration_sec}s`;
        const m=document.createElement('div'); m.className='meta-row';
        m.innerHTML=`<span class="${o.success?'done-tag':'err-tag'}">${esc(tag)}</span>`;
        msgsEl.appendChild(m); scrollEnd();
        if(o.success)loadVer();
        agentRow=null; agentBubble=null; textBuf='';
      } else doneOk(o.duration_sec);
      break;
    case 'error': doneErr(o.message||JSON.stringify(o)); break;
  }
}

async function run(){
  const task=taskEl.value.trim(); if(!task)return;
  taskEl.blur(); running=true; ui(); closeSheet();
  addUser(task); textBuf=''; taskEl.value=''; taskEl.style.height='';
  const body={task,model:$('#model').value,budget:parseInt($('#budget').value),
    max_turns:parseInt($('#max-turns').value),backend:'openai',
    api_base:'http://127.0.0.1:5001',stream:true,fallback:false};
  try{
    const res=await fetch('/run',{method:'POST',headers:hdrs(true),body:JSON.stringify(body)});
    if(!res.ok){doneErr(`HTTP ${res.status}`);return;}
    reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;while((i=buf.indexOf('\n\n'))>=0){onEvent(buf.slice(0,i),false);buf=buf.slice(i+2);}
    }
  }catch(e){if(e.name!=='AbortError')doneErr(e.message);}
  finally{running=false;ui();reader=null;agentRow=null;agentBubble=null;textBuf='';}
}

async function doEvolve(){
  if(running||evolving)return;
  evolving=true; ui(); closeSheet(); textBuf='';
  try{
    const res=await fetch('/evolve',{method:'POST',headers:hdrs(false)});
    if(!res.ok){removeWelcome();doneErr(`HTTP ${res.status}`);return;}
    reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i;while((i=buf.indexOf('\n\n'))>=0){onEvent(buf.slice(0,i),true);buf=buf.slice(i+2);}
    }
  }catch(e){if(e.name!=='AbortError')doneErr(e.message);}
  finally{evolving=false;ui();reader=null;agentRow=null;agentBubble=null;textBuf='';}
}

async function doStop(){
  if(reader){try{reader.cancel();}catch{}reader=null;}
  try{await fetch('/stop',{method:'POST',headers:hdrs(false)});}catch{}
  if(agentBubble){clearThink();agentBubble.innerHTML='<span style="color:var(--sub)">⏹ 停止</span>';}
  running=false;evolving=false;ui();
  agentRow=null;agentBubble=null;textBuf='';
}

const vibe=(ms=8)=>{try{navigator.vibrate&&navigator.vibrate(ms);}catch{}};

sendBtn.addEventListener('click',()=>{vibe();(running||evolving)?doStop():run();});
$('#evo-btn').addEventListener('click',()=>{vibe();evolving?doStop():doEvolve();});
taskEl.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();run();}});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(running||evolving)doStop();else if(sheet.classList.contains('open'))closeSheet();}
});

for(const b of document.querySelectorAll('.chip'))
  b.addEventListener('click',()=>{vibe(4);taskEl.value=b.dataset.t;taskEl.dispatchEvent(new Event('input'));taskEl.focus();});

/* シートをスワイプで閉じる */
(()=>{
  let sy=0,dy=0;
  sheet.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;dy=0;},{passive:true});
  sheet.addEventListener('touchmove',e=>{
    dy=e.touches[0].clientY-sy;
    if(dy>0)sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',()=>{
    if(dy>80){closeSheet();}
    sheet.style.transform='';
  });
})();

async function loadVer(){
  try{
    const r=await fetch('/version',{headers:hdrs(false)});if(!r.ok)return;
    const d=await r.json();
    $('#ver-text').textContent=`v${d.binary_v||'?'} — 自己進化`;
  }catch{}
}
loadVer(); setInterval(loadVer,60000);

/* スマホ初回: トークン未設定なら設定シートを開くよう促す */
(()=>{
  const tok=localStorage.getItem('evo_token')||'';
  if(!tok){
    setTimeout(()=>{
      const b=document.createElement('div');
      b.style.cssText='position:fixed;top:calc(52px + env(safe-area-inset-top,0px) + 10px);left:50%;transform:translateX(-50%);background:#1c1c28;border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:13px;padding:10px 18px;border-radius:12px;z-index:50;cursor:pointer;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)';
      b.textContent='⚙️ 設定からトークンを入力してください';
      b.onclick=()=>{openSheet();b.remove();};
      document.body.appendChild(b);
      setTimeout(()=>b.remove(),8000);
    },600);
  }
})();
</script>
